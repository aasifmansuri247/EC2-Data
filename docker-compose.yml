services:

  frontend:
    image: techmypassion/react-frontend:v1.1
    container_name: frontend

  backend:
    image: techmypassion/node-api:v1.2
    container_name: backend

  # mongodb:
  #  image: mongo:latest
  #  container_name: mongodb

   # ports:
    #  - "27017:27017"

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - frontend
      - backend
